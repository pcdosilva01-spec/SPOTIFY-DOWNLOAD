<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Downloader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header>
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        <span>Spotify Downloader</span>
      </div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
      <h1>Baixe sua playlist</h1>
      <p class="subtitle">Cole o link de qualquer playlist pública do Spotify</p>
      <div class="search-box">
        <input
          type="text"
          id="playlistUrl"
          placeholder="https://open.spotify.com/playlist/..."
          autocomplete="off"
        />
        <button id="fetchBtn" onclick="fetchPlaylist()">
          <span id="fetchBtnText">Buscar Playlist</span>
          <div id="fetchSpinner" class="spinner hidden"></div>
        </button>
      </div>
      <div id="errorMsg" class="error-msg hidden"></div>
    </section>

    <!-- Playlist Info -->
    <section id="playlistSection" class="playlist-section hidden">
      <div class="playlist-header">
        <img id="playlistCover" src="" alt="Capa" />
        <div class="playlist-meta">
          <span class="playlist-label">PLAYLIST</span>
          <h2 id="playlistName"></h2>
          <p id="playlistDesc"></p>
          <p id="playlistTotal" class="track-count"></p>
          <div class="action-buttons">
            <button id="downloadAllBtn" class="btn-primary" onclick="downloadAll()">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M5 20h14v-2H5v2zm7-18L5.33 9h3.84v6h5.66V9h3.84L12 2z"/></svg>
              Baixar Tudo
            </button>
            <button class="btn-secondary" onclick="downloadZip()">
              <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.06 15.94 0 13.36 0c-1.3 0-2.48.52-3.34 1.36L9 2.38 7.98 1.36C7.12.52 5.94 0 4.64 0 2.06 0 0 2.06 0 4.64c0 .48.11.92.18 1.36H0v2h20V6zm-9.5 0H4.64C3.16 6 2 4.84 2 3.36S3.16.72 4.64.72c.74 0 1.42.3 1.92.78L9 4.02l2.5-2.5V6zm5.86 0h-5.86V2.52l2.44-2.44c.5-.48 1.18-.78 1.92-.78C16.34.3 17.5 1.46 17.5 2.94S16.34 6 14.86 6zM4 8v12h16V8H4zm8 9l-4-4h3V9h2v4h3l-4 4z"/></svg>
              Baixar ZIP
            </button>
          </div>
        </div>
      </div>

      <!-- Progress Bar (download all) -->
      <div id="progressContainer" class="progress-container hidden">
        <div class="progress-info">
          <span id="progressText">Baixando...</span>
          <span id="progressCount">0 / 0</span>
        </div>
        <div class="progress-bar-bg">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </div>

      <!-- Track List -->
      <div id="trackList" class="track-list"></div>
    </section>

  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
